<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponocom CRM – Dashboard</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #000;
            padding: 20px;
            text-align: center;
        }

        header img {
            width: 150px;
        }

        .dashboard-wrapper {
            flex: 1;
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #000;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            text-align: center;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .card a {
            display: inline-block;
            padding: 10px 18px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
        }

        .card a:hover {
            background: #333;
        }

        footer {
            background: #000;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Ponocom Media AB logotyp">
</header>

<div class="dashboard-wrapper">
    <h1>Välkommen till Ponocoms interna CRM‑portal</h1>

    <div class="card-grid">

        <div class="card">
            <h3>Gå till CRM‑systemet</h3>
            <a href="#" id="crm-link">Öppna CRM</a>
        </div>

        <div class="card">
            <h3>Support & Ärenden</h3>
            <a href="#">Öppna supportpanel</a>
        </div>

        <div class="card">
            <h3>Fakturor & Ekonomi</h3>
            <a href="#">Visa ekonomi</a>
        </div>

        <div class="card">
            <h3>Logga ut</h3>
            <a href="crm-portal-9821-access.html">Tillbaka till inloggning</a>
        </div>

    </div>
</div>

<footer>
    © 2026 Ponocom Media AB – Intern CRM‑portal
</footer>

<script>
    // När du får den riktiga CRM‑URL:en, lägg in den här:
    const REAL_CRM_URL = "https://din-crm-url-här.se";

    document.getElementById("crm-link").addEventListener("click", function(e) {
        e.preventDefault();
        window.location.href = REAL_CRM_URL;
    });
</script>

</body>
</html>
