<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponocom CRM – Inloggning</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f3f3f3 50%, #ffffff 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 25px;
            text-align: center;
        }

        /* Rundad logga */
        header img {
            width: 170px;
            border-radius: 14px;
            filter: drop-shadow(0 0 6px rgba(0,0,0,0.15));
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-container {
            background: #fff;
            padding: 40px;
            width: 360px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            text-align: center;
            border: 1px solid #e6e6e6;
        }

        .login-container h2 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
            color: #000;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .login-container button:hover {
            background: #333;
        }

        #login-error {
            color: #ff4d4d;
            margin-top: 10px;
            min-height: 20px;
        }

        footer {
            background: #000;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Ponocom Media AB logotyp">
</header>

<div class="login-wrapper">
    <div class="login-container">
        <h2>CRM – Inloggning</h2>

        <form id="login-form">
            <input type="text" id="username" placeholder="Användarnamn" required>
            <input type="password" id="password" placeholder="Lösenord" required>
            <button type="submit">Logga in</button>
            <p id="login-error"></p>
        </form>
    </div>
</div>

<footer>
    © 2026 Ponocom Media AB – Intern CRM‑portal
</footer>

<script>
    // Tillåtna användare
    const users = {
        "Admin": "Dan4ev",
        "F.Nox": "Kyrkavgift!",
        "Za Print": "Zlatomir"
    };

    document.getElementById("login-form").addEventListener("submit", function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const errorEl = document.getElementById("login-error");

        if (users[username] && users[username] === password) {

            // Spara användarnamnet så dashboarden kan visa det
            localStorage.setItem("ponocom_user", username);

            // Skicka vidare till dashboard
            window.location.href = "dashboard.html";

        } else {
            errorEl.textContent = "Fel användarnamn eller lösenord.";
        }
    });
</script>

</body>
</html>
