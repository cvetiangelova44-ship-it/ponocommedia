<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponocom CRM – Inloggning</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f3f3f3 50%, #ffffff 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER – ENDA HEADERN */
        header {
            padding: 20px;
            text-align: center;
        }

        header img {
            width: 160px;
        }

        /* Login-box */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-container {
            background: #fff;
            padding: 40px;
            width: 350px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 25px;
            font-size: 24px;
            color: #000;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-container button:hover {
            background: #333;
        }

        /* Footer */
        footer {
            background: #000;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- HEADER (INGEN MENY, ENDA HEADERN) -->
    <header>
        <img src="logo.png" alt="Ponocom Media AB logotyp">
    </header>

    <!-- LOGIN -->
    <div class="login-wrapper">
        <div class="login-container">
            <h2>CRM – Inloggning</h2>

            <form>
                <input type="email" placeholder="E‑postadress" required>
                <input type="password" placeholder="Lösenord" required>
                <button type="submit">Logga in</button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Ponocom Media AB – Intern CRM‑portal
    </footer>

</body>
</html>
